[project]
name = "charted"
version = "0.1.8a"
description = "Charted is a zero dependency SVG chart generator that aims to provide a simple interface for generating beautiful and customisable graphs. This project is inspired by chart libraries like mermaid.js."
authors = [{name = "Andryo Marzuki", email = "andryo@mrzk.io"}]
readme = "README.md"
requires-python = ">=3.10"

[project.optional-dependencies]
dev = [
    "pytest>=8.2.1",
    "pytest-cov>=4.1.0",
    "ipython>=8.24.0",
    "flake8>=7.0.0",
    "black>=24.4.2",
    "tox>=4.15.1",
]
docs = [
    "sphinx>=7.3.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = ["tests"]

[tool.pytest-cov]
path = ["charted"]
report = ["term-missing", "html"]

[dependency-groups]
dev = ["charted[dev]"]
