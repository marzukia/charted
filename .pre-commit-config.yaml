repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: check-docs
        name: Check documentation coverage
        entry: python scripts/check_docs_coverage.py
        language: python
        pass_filenames: false
